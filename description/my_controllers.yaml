controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true 

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - arm_base2_joint
      - arm_slide_joint_L
      - arm_slide_joint_R
    
    command_interfaces:
      - position
    state_interfaces:
      - position
      # ลบหรือใส่คอมเมนต์ - velocity ออก เพราะ URDF ของคุณไม่มี interface นี้สำหรับทุก joint
      # เพื่อให้ controller สามารถ activate ได้โดยไม่ติด error เรื่อง key missing

    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0